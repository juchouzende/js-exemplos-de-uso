<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5a: Contador de Cliques</title>
</head>
<body>

  <!-- Botão para incrementar o contador -->
  <button id="myButton">Clique aqui</button>

  <!-- Parágrafo onde o contador será exibido -->
  <p id="myText">Cliques: 0</p>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Seleciona o botão e o parágrafo pelo ID
    const button = document.querySelector('#myButton');
    const text = document.querySelector('#myText');

    // Inicializa o contador
    let contador = 0;

    // Adiciona um evento de clique ao botão
    button.addEventListener('click', () => {

      // Incrementa o contador
      contador++;

      // Atualiza o texto do parágrafo
      text.textContent = `Cliques: ${contador}`;

      // Muda a cor de fundo conforme par ou ímpar
      if (contador % 2 === 0) {
        text.style.backgroundColor = 'green';
      } else {
        text.style.backgroundColor = 'red';
      }

    });
  </script>

</body>
</html>
